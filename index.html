<!doctype html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <title>Gun Game FPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }
        
        #lobby h1 {
            font-size: 48px;
            color: #e94560;
            text-shadow: 0 0 20px #e94560;
        }

        #lobby input, #lobby select {
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            width: 300px;
            background: #16213e;
            color: white;
            border: 2px solid #e94560;
        }

        #lobby button {
            padding: 12px 40px;
            font-size: 20px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        #lobby button:hover { background: #c73652; }

        #skinPicker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 400px;
        }

        .skinOption {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }

        .skinOption.selected { border-color: white; transform: scale(1.2); }

        #gameContainer { display: none; position: relative; }
        
        #gameCanvas { display: block; }

        #hud {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #healthBar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }

        #healthBarInner {
            width: 200px;
            height: 20px;
            background: #e94560;
            border-radius: 4px;
            transition: width 0.2s;
        }

        #ammoDisplay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 24px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }

        #weaponDisplay {
            position: absolute;
            bottom: 70px;
            right: 20px;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }

        #killFeed {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .killFeedItem {
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }

        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }

        #crosshair::after {
            width: 20px;
            height: 2px;
            top: 9px;
            left: 0;
        }

        #deathScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 12px;
            pointer-events: none;
        }

        #deathScreen h2 { color: #e94560; font-size: 36px; }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }

        #reloadIndicator {
            display: none;
            position: absolute;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 6px;
            color: yellow;
        }
    </style>
</head>
<body>

<div id='lobby'>
    <h1>🏝️ Island FPS</h1>
    <input type='text' id='usernameInput' placeholder='Enter your username...' maxlength='20'>
    <div>
        <p style='text-align:center;margin-bottom:10px;'>Pick a skin:</p>
        <div id='skinPicker'></div>
    </div>
    <div>
        <p style='text-align:center;margin-bottom:10px;'>Pick a weapon:</p>
        <select id='weaponSelect'>
            <option value='ar'>Auto AR</option>
            <option value='burst'>Burst AR</option>
            <option value='smg'>SMG</option>
            <option value='deagle'>Deagle</option>
            <option value='sniper'>Sniper</option>
            <option value='rpg'>RPG</option>
            <option value='spellbook'>Spellbook 🔥</option>
        </select>
    </div>
    <button id='joinBtn'>Join Game</button>
    <p id='lobbyError' style='color:#e94560;'></p>
</div>

<div id='gameContainer'>
    <canvas id='gameCanvas'></canvas>
    <div id='hud'>
        <div id='crosshair'></div>
        <div id='healthBar'>
            ❤️ <div id='healthBarInner'></div>
        </div>
        <div id='ammoDisplay'>🔫 <span id='ammoCount'>30</span></div>
        <div id='weaponDisplay'>🗡️ <span id='currentWeapon'>AR</span></div>
        <div id='killFeed'></div>
        <div id='deathScreen'>
            <h2>YOU DIED</h2>
            <p id='killedByText'></p>
            <p>Respawning in <span id='respawnTimer'>3</span>s...</p>
        </div>
        <div id='scoreboard'></div>
        <div id='reloadIndicator'>Reloading...</div>
    </div>
</div>

<script src='/socket.io/socket.io.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
<script src='game.js'></script>
</body>
</html>
